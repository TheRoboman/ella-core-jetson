// OAI PNF (Physical Network Function) config for Phase B.
// Runs L1 + RF on the Jetson AGX Orin.
// Connects via nFAPI (P5 control + P7 data) over Ethernet to the
// VNF (L2 + L3) running on the ADRV9361-Z7035 board.
//
// VNF is at 169.254.237.42 (ARM board)
// PNF is at 169.254.237.1  (Jetson)

Active_gNBs = ( "gNB-Eurecom-5GNRBox");

log_config = {
  global_log_level = "info";
  hw_log_level     = "info";
  phy_log_level    = "info";
};

L1s = ({
  num_cc           = 1;
  tr_n_preference  = "nfapi";
  remote_n_address = "169.254.237.42"; // VNF addr (board)
  local_n_address  = "169.254.237.1";  // PNF addr (jetson)
  local_n_portc    = 50000;            // PNF P5 port
  remote_n_portc   = 50001;            // VNF P5 port
  local_n_portd    = 50010;            // PNF P7 port
  remote_n_portd   = 50011;            // VNF P7 port
});

RUs = ({
  local_rf                          = "yes";
  nb_tx                             = 1;
  nb_rx                             = 1;
  att_tx                            = 0;
  att_rx                            = 0;
  bands                             = [78];
  sl_ahead                          = 2;
  max_pdschReferenceSignalPower     = -27;
  max_rxgain                        = 125;
});

rfsimulator = ({
  serveraddr = "server";
  serverport = 4043;
  options    = ();
  modelname  = "AWGN";
});
